spring.application.name=api

# Schema is owned by the dedicated Flyway migration step (db/migrations), not the app.
spring.flyway.enabled=false

# Datasource — values come from the environment (see .env / .env.example).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/impressions}
spring.datasource.username=${POSTGRES_USER:impressions}
spring.datasource.password=${POSTGRES_PASSWORD:impressions}

management.endpoints.web.exposure.include=health,info
